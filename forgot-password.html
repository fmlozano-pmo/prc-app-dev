<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password — Megawide EPC Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html,body{height:100%;font-family:'Montserrat',sans-serif;background:#F4F4F4;display:flex;align-items:center;justify-content:center;padding:24px}
    .card{background:#fff;border-radius:16px;box-shadow:0 4px 32px rgba(0,0,0,.08);padding:48px 40px;max-width:420px;width:100%}
    .logo-wrap{margin-bottom:28px}
    .logo-wrap img{height:32px;width:auto;object-fit:contain}
    h1{font-size:20px;font-weight:700;color:#231F20;margin-bottom:6px}
    .sub{font-size:13px;color:#888;margin-bottom:24px;line-height:1.6}
    .field label{display:block;font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:#888;margin-bottom:6px}
    .field input{width:100%;padding:11px 14px;border:1.5px solid #e8e8e8;border-radius:8px;font-size:14px;font-family:'Montserrat',sans-serif;color:#231F20;outline:none;transition:border-color .15s}
    .field input:focus{border-color:#EE3124}
    .btn{width:100%;padding:13px;background:#EE3124;color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:700;font-family:'Montserrat',sans-serif;cursor:pointer;margin-top:16px;transition:background .15s}
    .btn:hover{background:#C42127}
    .btn:disabled{background:#e8a09b;cursor:default}
    .msg{font-size:13px;padding:10px 14px;border-radius:8px;margin-bottom:14px;display:none;line-height:1.5}
    .msg.error{background:#FEE2E2;color:#991B1B;display:block}
    .msg.success{background:#D1FAE5;color:#065F46;display:block}
    .back{text-align:center;margin-top:16px;font-size:13px;color:#888}
    .back a{color:#EE3124;text-decoration:none;font-weight:600}
  </style>
</head>
<body>
  <div class="card">
    <div class="logo-wrap">
      <img src="assets/img/megawide-logo.png" alt="Megawide" style="filter:invert(1) brightness(0)">
    </div>
    <h1>Reset Password</h1>
    <p class="sub">Enter your company email and we'll send you a link to reset your password.</p>
    <div class="msg" id="msg"></div>
    <div class="field">
      <label>Email Address</label>
      <input type="email" id="email" placeholder="yourname@megawide.com.ph" autocomplete="email">
    </div>
    <button class="btn" id="btn">Send Reset Link</button>
    <div class="back"><a href="login.html">← Back to Sign In</a></div>
  </div>
  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';
    const sb = createClient(
      'https://cayjeqeleenizbdzrums.supabase.co',
      'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNheWplcWVsZWVuaXpiZHpydW1zIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk3OTE5NzUsImV4cCI6MjA5NTM2Nzk3NX0.xWF6mSMTYSL65S56FTUSWFN0udJSY_yzUedU2CwFwpw'
    );
    document.getElementById('btn').addEventListener('click', async () => {
      const email = document.getElementById('email').value.trim();
      const msg = document.getElementById('msg');
      const btn = document.getElementById('btn');
      msg.className = 'msg'; msg.textContent = '';
      if (!email) { msg.textContent = 'Please enter your email.'; msg.className = 'msg error'; return; }
      btn.textContent = 'Sending…'; btn.disabled = true;
      const { error } = await sb.auth.resetPasswordForEmail(email, {
        redirectTo: 'https://wpm-dashboard-rosy.vercel.app/login.html'
      });
      if (error) {
        msg.textContent = error.message; msg.className = 'msg error';
        btn.textContent = 'Send Reset Link'; btn.disabled = false;
      } else {
        msg.textContent = 'Reset link sent! Check your email inbox.'; msg.className = 'msg success';
        btn.textContent = 'Sent ✓'; 
      }
    });
    document.getElementById('email').addEventListener('keydown', e => { if(e.key==='Enter') document.getElementById('btn').click(); });
  </script>
</body>
</html>
