<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>User Management — Megawide EPC</title>
  <link rel="stylesheet" href="assets/css/dashboard.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    /* ── Modal fix: was overflowing and hiding the Approve button ── */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }
    .modal {
      background: #fff;
      border-radius: 12px;
      width: 100%;
      max-width: 420px;
      /* KEY FIX: flex column + max-height so button is always visible */
      display: flex;
      flex-direction: column;
      max-height: 90vh;
      overflow: hidden;
    }
    .modal-header {
      padding: 20px 20px 0;
      flex-shrink: 0;
    }
    .modal-body {
      padding: 16px 20px;
      overflow-y: auto;          /* scroll if many projects */
      flex: 1;
    }
    .modal-footer {
      padding: 12px 20px 20px;
      flex-shrink: 0;            /* NEVER pushed off screen */
      border-top: 1px solid #f0f0f0;
      display: flex;
      gap: 10px;
    }
    .modal-title {
      font-size: 16px;
      font-weight: 600;
      color: #231F20;
      margin: 0 0 4px;
    }
    .modal-subtitle {
      font-size: 13px;
      color: #888;
      margin: 0 0 16px;
    }
    .modal-field-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: .06em;
      color: #888;
      text-transform: uppercase;
      margin-bottom: 8px;
    }
    .project-checkboxes {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-bottom: 16px;
    }
    .project-checkbox-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 10px;
      border: 1px solid #e5e5e5;
      border-radius: 8px;
      cursor: pointer;
      transition: border-color .15s;
    }
    .project-checkbox-item:hover { border-color: #EE3124; }
    .project-checkbox-item input[type="checkbox"] {
      width: 16px; height: 16px;
      accent-color: #EE3124;
      cursor: pointer;
    }
    .project-checkbox-item label {
      font-size: 14px;
      font-weight: 500;
      color: #231F20;
      cursor: pointer;
    }
    .role-select {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #e5e5e5;
      border-radius: 8px;
      font-size: 14px;
      font-family: 'Montserrat', sans-serif;
      color: #231F20;
      background: #fff;
      appearance: auto;
    }
    .btn-approve {
      flex: 1;
      padding: 10px;
      background: #EE3124;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      font-family: 'Montserrat', sans-serif;
      cursor: pointer;
      transition: background .15s;
    }
    .btn-approve:hover { background: #C42127; }
    .btn-cancel {
      padding: 10px 16px;
      background: transparent;
      color: #666;
      border: 1px solid #e5e5e5;
      border-radius: 8px;
      font-size: 14px;
      font-family: 'Montserrat', sans-serif;
      cursor: pointer;
      transition: border-color .15s;
    }
    .btn-cancel:hover { border-color: #999; }

    /* ── KPI cards: single column on mobile ── */
    .kpi-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
      margin-bottom: 20px;
    }
    @media (max-width: 480px) {
      .kpi-grid { grid-template-columns: 1fr; }
    }
    .kpi-card {
      background: #fff;
      border: 1px solid #f0f0f0;
      border-radius: 12px;
      padding: 16px 18px;
    }
    .kpi-value {
      font-size: 28px;
      font-weight: 700;
      color: #231F20;
      line-height: 1;
    }
    .kpi-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: .06em;
      text-transform: uppercase;
      color: #888;
      margin-top: 4px;
    }

    /* ── User table: scrollable on mobile ── */
    .table-wrapper {
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }
    .user-table {
      width: 100%;
      min-width: 560px;
      border-collapse: collapse;
    }
    .user-table th {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: .06em;
      text-transform: uppercase;
      color: #888;
      padding: 10px 12px;
      text-align: left;
      border-bottom: 1px solid #f0f0f0;
    }
    .user-table td {
      padding: 12px;
      font-size: 14px;
      color: #231F20;
      border-bottom: 1px solid #f5f5f5;
    }
    .user-table tr:last-child td { border-bottom: none; }
    .user-table tr:hover td { background: #fafafa; }
    .action-btn {
      padding: 5px 12px;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      border: none;
      font-family: 'Montserrat', sans-serif;
      transition: opacity .15s;
    }
    .action-btn:hover { opacity: .8; }
    .btn-approve-row { background: #EE3124; color: #fff; }
    .btn-reject-row { background: #f5f5f5; color: #666; }
    .badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 10px;
      font-size: 11px;
      font-weight: 600;
    }
    .badge-pending { background: #FEF3C7; color: #92400E; }
    .badge-approved { background: #D1FAE5; color: #065F46; }
    .badge-rejected { background: #FEE2E2; color: #991B1B; }

    /* ── Tab toggles ── */
    .tab-row { display: flex; gap: 4px; margin-bottom: 16px; }
    .tab-btn {
      padding: 7px 16px;
      border: 1px solid #e5e5e5;
      border-radius: 8px;
      background: transparent;
      font-size: 13px;
      font-weight: 500;
      font-family: 'Montserrat', sans-serif;
      cursor: pointer;
      color: #888;
      transition: all .15s;
    }
    .tab-btn.active {
      background: #231F20;
      border-color: #231F20;
      color: #fff;
    }

    /* ── Page layout ── */
    .page-content { padding: 20px; max-width: 800px; }
    .section-card {
      background: #fff;
      border: 1px solid #f0f0f0;
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 20px;
    }
    .hidden { display: none !important; }
    .user-info { font-size: 14px; color: #231F20; }
    .user-email { font-size: 12px; color: #888; }
  </style>
</head>
<body>
  <!-- Your existing nav/sidebar here -->

  <div class="page-content">

    <!-- KPI Cards -->
    <div class="kpi-grid" id="kpiGrid">
      <div class="kpi-card">
        <div class="kpi-value" id="kpiTotal">—</div>
        <div class="kpi-label">Total Registrations</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-value" id="kpiPending">—</div>
        <div class="kpi-label">Pending Approval</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-value" id="kpiApproved">—</div>
        <div class="kpi-label">Approved Users</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-value" id="kpiRejected">—</div>
        <div class="kpi-label">Rejected</div>
      </div>
    </div>

    <!-- Tab row -->
    <div class="tab-row">
      <button class="tab-btn active" id="tabPending" onclick="switchTab('pending')">Pending</button>
      <button class="tab-btn" id="tabAll" onclick="switchTab('all')">All Users</button>
    </div>

    <!-- User list card -->
    <div class="section-card">
      <div class="table-wrapper">
        <table class="user-table" id="userTable">
          <thead>
            <tr>
              <th>#</th>
              <th>Name</th>
              <th>Email</th>
              <th>Role</th>
              <th>Registered</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="userTableBody">
            <tr><td colspan="6" style="text-align:center;color:#888;padding:24px">Loading…</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- ── APPROVE MODAL ── -->
  <div class="modal-overlay hidden" id="approveModal">
    <div class="modal">
      <div class="modal-header">
        <div class="modal-title">Approve Registration</div>
        <div class="modal-subtitle">Assign projects and role for this user, then confirm approval.</div>
      </div>

      <div class="modal-body">
        <!-- User info -->
        <div class="modal-field-label">User</div>
        <div style="margin-bottom:16px">
          <div class="user-info" id="modalUserName">—</div>
          <div class="user-email" id="modalUserEmail">—</div>
        </div>

        <!-- Project checkboxes -->
        <div class="modal-field-label">Assign Projects</div>
        <div class="project-checkboxes" id="modalProjectList">
          <!-- populated by JS -->
        </div>

        <!-- Role selector -->
        <div class="modal-field-label">Role</div>
        <select class="role-select" id="modalRoleSelect">
          <option value="user">User — assigned projects only</option>
          <option value="admin">Admin — assigned projects + user management</option>
          <option value="super_admin">Super Admin — all projects + full control</option>
        </select>
      </div>

      <!-- FOOTER: always visible, never clipped -->
      <div class="modal-footer">
        <button class="btn-approve" id="btnConfirmApprove" onclick="confirmApprove()">
          ✓ Approve &amp; Assign
        </button>
        <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      </div>
    </div>
  </div>

  <script type="module">
    // ── Firebase / Supabase imports go here ──
    // import { db, auth } from './assets/js/firebase-config.js';
    // OR for Supabase: import { supabase } from './assets/js/supabase-config.js';

    let currentTab = 'pending';
    let pendingUserId = null;
    let allProjects = [];

    // Expose functions to global scope for onclick handlers
    window.switchTab = function(tab) {
      currentTab = tab;
      document.getElementById('tabPending').classList.toggle('active', tab === 'pending');
      document.getElementById('tabAll').classList.toggle('active', tab === 'all');
      loadUsers(tab);
    };

    window.openApproveModal = function(userId, name, email) {
      pendingUserId = userId;
      document.getElementById('modalUserName').textContent = name;
      document.getElementById('modalUserEmail').textContent = email;

      // Populate project checkboxes
      const list = document.getElementById('modalProjectList');
      list.innerHTML = allProjects.map(p => `
        <div class="project-checkbox-item">
          <input type="checkbox" id="proj_${p.id}" value="${p.id}">
          <label for="proj_${p.id}">${p.name || p.id}</label>
        </div>
      `).join('');

      document.getElementById('approveModal').classList.remove('hidden');
    };

    window.closeModal = function() {
      document.getElementById('approveModal').classList.add('hidden');
      pendingUserId = null;
    };

    window.confirmApprove = async function() {
      if (!pendingUserId) return;

      const selectedProjects = [...document.querySelectorAll('#modalProjectList input:checked')]
        .map(cb => cb.value);
      const role = document.getElementById('modalRoleSelect').value;

      const btn = document.getElementById('btnConfirmApprove');
      btn.textContent = 'Approving…';
      btn.disabled = true;

      try {
        // ── Firebase version ──
        // await updateDoc(doc(db, 'users', pendingUserId), {
        //   status: 'approved',
        //   role,
        //   projects: selectedProjects,
        // });

        // ── Supabase version ──
        // await supabase.from('users').update({
        //   status: 'approved', role, projects: selectedProjects
        // }).eq('id', pendingUserId);

        closeModal();
        loadUsers(currentTab);
        updateKPIs();
      } catch (err) {
        console.error('Approve failed:', err);
        btn.textContent = '✓ Approve & Assign';
        btn.disabled = false;
      }
    };

    async function loadProjects() {
      try {
        // Firebase: const snap = await getDocs(collection(db, 'projects'));
        // allProjects = snap.docs.map(d => ({ id: d.id, ...d.data() }));

        // Supabase: const { data } = await supabase.from('projects').select('id, name');
        // allProjects = data || [];

        // Fallback for now:
        allProjects = [{ id: 'AVR101', name: 'AVR101 — Avesta Residences T1' }];
      } catch (err) {
        console.error('Load projects failed:', err);
      }
    }

    async function loadUsers(filter) {
      const tbody = document.getElementById('userTableBody');
      tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;color:#888;padding:24px">Loading…</td></tr>';

      try {
        // Firebase:
        // let q = collection(db, 'users');
        // if (filter === 'pending') q = query(q, where('status', '==', 'pending'));
        // const snap = await getDocs(q);
        // const users = snap.docs.map(d => ({ id: d.id, ...d.data() }));

        // Supabase:
        // let q = supabase.from('users').select('*');
        // if (filter === 'pending') q = q.eq('status', 'pending');
        // const { data: users } = await q.order('created_at', { ascending: false });

        // Placeholder:
        const users = [];

        if (!users.length) {
          tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;color:#888;padding:24px">No users found</td></tr>';
          return;
        }

        tbody.innerHTML = users.map((u, i) => `
          <tr>
            <td>${i + 1}</td>
            <td>
              <div class="user-info">${u.name || '—'}</div>
            </td>
            <td><div class="user-email">${u.email}</div></td>
            <td><span class="badge badge-${u.role === 'super_admin' ? 'approved' : u.role === 'admin' ? 'approved' : 'pending'}">${u.role || 'user'}</span></td>
            <td style="color:#888;font-size:12px">${u.created_at ? new Date(u.created_at).toLocaleDateString('en-PH', { month: 'short', day: 'numeric' }) : '—'}</td>
            <td>
              ${u.status === 'pending' ? `
                <button class="action-btn btn-approve-row" onclick="openApproveModal('${u.id}', '${u.name}', '${u.email}')">Approve</button>
              ` : `
                <span class="badge badge-${u.status}">${u.status}</span>
              `}
            </td>
          </tr>
        `).join('');

      } catch (err) {
        console.error('Load users failed:', err);

    }

    async function updateKPIs() {
      try {
        // Firebase: run count queries per status

        // For now update based on loaded data
      } catch (err) {
        console.error('KPI update failed:', err);
      }
    }

    // Init
    await loadProjects();
    await loadUsers('pending');
    await updateKPIs();

    // Close modal on overlay click
    document.getElementById('approveModal').addEventListener('click', function(e) {
      if (e.target === this) closeModal();
    });
  </script>
</body>
</html>
