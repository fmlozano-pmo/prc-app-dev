<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In — Megawide EPC Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; font-family: 'Montserrat', sans-serif; }

    /* ── Layout: split panel ── */
    .page {
      display: flex;
      min-height: 100vh;
    }

    /* ── Left: branding panel ── */
    .brand-panel {
      flex: 1;
      background: #231F20;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 48px;
      position: relative;
      overflow: hidden;
    }
    /* Red curved corner — Megawide brand signature */
    .brand-panel::after {
      content: '';
      position: absolute;
      bottom: -80px;
      left: -80px;
      width: 280px;
      height: 280px;
      border-radius: 50%;
      background: #EE3124;
      opacity: .12;
      pointer-events: none;
    }
    .brand-logo {
      /* Logo on dark bg — use white version */
      height: 38px;
      width: auto;
    }
    .brand-tagline {
      font-size: 28px;
      font-weight: 700;
      color: #fff;
      line-height: 1.3;
      max-width: 360px;
    }
    .brand-tagline span { color: #EE3124; }
    .brand-sub {
      font-size: 13px;
      color: rgba(255,255,255,.45);
      margin-top: 10px;
    }

    /* ── Right: form panel ── */
    .form-panel {
      width: 420px;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 48px 44px;
      background: #fff;
    }
    .form-title {
      font-size: 22px;
      font-weight: 700;
      color: #231F20;
      margin-bottom: 4px;
    }
    .form-subtitle {
      font-size: 13px;
      color: #888;
      margin-bottom: 32px;
    }

    /* Fields */
    .field { margin-bottom: 16px; }
    .field label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: .06em;
      text-transform: uppercase;
      color: #888;
      margin-bottom: 6px;
    }
    .field input {
      width: 100%;
      padding: 11px 14px;
      border: 1px solid #e5e5e5;
      border-radius: 8px;
      font-size: 14px;
      font-family: 'Montserrat', sans-serif;
      color: #231F20;
      background: #fff;
      transition: border-color .15s;
      outline: none;
    }
    .field input:focus { border-color: #EE3124; }

    .btn-signin {
      width: 100%;
      padding: 13px;
      background: #EE3124;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 700;
      font-family: 'Montserrat', sans-serif;
      cursor: pointer;
      transition: background .15s;
      margin-top: 8px;
    }
    .btn-signin:hover { background: #C42127; }
    .btn-signin:disabled { background: #f0a0a0; cursor: default; }

    .error-msg {
      display: none;
      background: #FEE2E2;
      color: #991B1B;
      font-size: 13px;
      padding: 10px 14px;
      border-radius: 8px;
      margin-bottom: 16px;
    }
    .error-msg.visible { display: block; }

    .register-link {
      text-align: center;
      margin-top: 20px;
      font-size: 13px;
      color: #888;
    }
    .register-link a {
      color: #EE3124;
      text-decoration: none;
      font-weight: 600;
    }

    /* ── Mobile: stack panels ── */
    @media (max-width: 680px) {
      .page { flex-direction: column; }
      .brand-panel {
        padding: 32px 24px 28px;
        flex: none;
        min-height: 180px;
      }
      .brand-panel::after { display: none; }
      .brand-tagline { font-size: 20px; }
      .form-panel {
        width: 100%;
        padding: 32px 24px;
        flex: 1;
      }
    }
  </style>
</head>
<body>
  <div class="page">

    <!-- Left: branding -->
    <div class="brand-panel">
      <!-- Logo: white version on dark background — no black box bleed -->
      <img class="brand-logo" src="assets/img/logo-white.png" alt="Megawide Construction">
      <div>
        <div class="brand-tagline">
          EPC Procurement<br><span>Work Package</span><br>Dashboard
        </div>
        <div class="brand-sub">Megawide Construction Corporation</div>
      </div>
    </div>

    <!-- Right: form -->
    <div class="form-panel">
      <div class="form-title">Welcome back</div>
      <div class="form-subtitle">Sign in to your account</div>

      <div class="error-msg" id="errorMsg"></div>

      <div class="field">
        <label>Email</label>
        <input type="email" id="email" placeholder="yourname@megawide.com.ph" autocomplete="email">
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
      </div>

      <button class="btn-signin" id="btnSignIn" onclick="handleSignIn()">Sign In</button>

      <div class="register-link">
        Don't have an account? <a href="register.html">Register</a>
      </div>
    </div>

  </div>

  <script type="module">
    import { signIn, initAuth } from './assets/js/auth.js';

    // If already logged in, redirect
    const { session, user } = await initAuth();
    if (session && user?.status === 'approved') {
      window.location.href = 'project-selector.html';
    }

    // Check for rejected param
    const params = new URLSearchParams(location.search);
    if (params.get('rejected')) {
      const err = document.getElementById('errorMsg');
      err.textContent = 'Your registration was not approved. Please contact your administrator.';
      err.classList.add('visible');
    }

    window.handleSignIn = async function() {
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const btn = document.getElementById('btnSignIn');
      const errMsg = document.getElementById('errorMsg');

      if (!email || !password) {
        errMsg.textContent = 'Please enter your email and password.';
        errMsg.classList.add('visible');
        return;
      }

      btn.textContent = 'Signing in…';
      btn.disabled = true;
      errMsg.classList.remove('visible');

      const { data, error } = await signIn(email, password);

      if (error) {
        errMsg.textContent = error.message === 'Invalid login credentials'
          ? 'Incorrect email or password.'
          : error.message;
        errMsg.classList.add('visible');
        btn.textContent = 'Sign In';
        btn.disabled = false;
        return;
      }

      // Check user status
      const { getCurrentUser } = await import('./assets/js/db.js');
      const user = await getCurrentUser();

      if (!user || user.status === 'pending') {
        window.location.href = 'pending.html';
        return;
      }
      if (user.status === 'rejected') {
        await import('./assets/js/auth.js').then(m => m.logout());
        errMsg.textContent = 'Your registration was not approved. Contact your administrator.';
        errMsg.classList.add('visible');
        btn.textContent = 'Sign In';
        btn.disabled = false;
        return;
      }

      // Approved — go to project selector
      window.location.href = 'project-selector.html';
    };

    // Enter key support
    document.getElementById('password').addEventListener('keydown', e => {
      if (e.key === 'Enter') window.handleSignIn();
    });
  </script>
</body>
</html>
