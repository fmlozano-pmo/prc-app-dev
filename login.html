<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/png" href="assets/img/favicon.png"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Sign In — Megawide EPC Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    html, body { overflow-x: hidden; }
    * { box-sizing: border-box; max-width: 100%; }
    img, canvas, svg { max-width: 100% !important; }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html,body{height:100%;font-family:'Montserrat',sans-serif;background:#fff}

    /* ── Two-column layout (desktop) ── */
    .page{display:flex;min-height:100vh}

    /* ── Brand panel ── */
    .brand{
      flex:0 0 380px;background:#231F20;
      display:flex;flex-direction:column;justify-content:space-between;
      padding:40px 36px;position:relative;overflow:hidden
    }
    .brand::before{
      content:'';position:absolute;bottom:-80px;left:-80px;
      width:280px;height:280px;border-radius:50%;
      background:#EE3124;opacity:.15;pointer-events:none
    }
    .brand-logo{width:100%;height:auto;max-height:70px;display:block;object-fit:contain;object-position:left center;background:transparent}
    .brand-text h1{font-size:26px;font-weight:700;color:#fff;line-height:1.25;margin-bottom:8px}
    .brand-text h1 span{color:#EE3124}
    .brand-text p{font-size:12px;color:rgba(255,255,255,.4)}

    /* ── Form panel ── */
    .form-wrap{
      flex:1;display:flex;flex-direction:column;justify-content:center;
      padding:40px 44px;background:#fff;overflow-y:auto;min-height:100vh
    }
    .form-inner{max-width:400px;width:100%;margin:0 auto}
    .form-title{font-size:22px;font-weight:700;color:#231F20;margin-bottom:4px}
    .form-sub{font-size:13px;color:#999;margin-bottom:24px}
    .field{margin-bottom:14px}
    .field label{display:block;font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:#888;margin-bottom:5px}
    .field input{width:100%;padding:11px 14px;border:1.5px solid #e8e8e8;border-radius:8px;font-size:14px;font-family:'Montserrat',sans-serif;color:#231F20;background:#fff;outline:none;transition:border-color .15s;-webkit-appearance:none}
    .field input:focus{border-color:#EE3124}
    .btn-primary{width:100%;padding:13px;background:#EE3124;color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:700;font-family:'Montserrat',sans-serif;cursor:pointer;transition:background .15s;margin-top:4px;-webkit-appearance:none}
    .btn-primary:hover{background:#C42127}
    .btn-primary:disabled{background:#e8a09b;cursor:default}
    .msg{font-size:13px;padding:10px 14px;border-radius:8px;margin-bottom:14px;line-height:1.5;display:none;border:1px solid #FFD0D0;background:#FEE2E2;color:#991B1B}
    .msg.show{display:block}
    .form-links{display:flex;justify-content:space-between;align-items:center;margin-top:14px;font-size:13px;color:#999}
    .form-links a{color:#EE3124;text-decoration:none;font-weight:600}

    /* ── Project picker ── */
    .project-picker{display:none}
    .project-picker.visible{display:block}
    .login-form.hidden{display:none}
    .role-badge{display:inline-block;font-size:10px;font-weight:600;padding:2px 8px;border-radius:10px;margin-left:6px;vertical-align:middle;white-space:nowrap}
    .role-super{background:#EDE9FE;color:#5B21B6}
    .role-admin{background:#D1FAE5;color:#065F46}
    .role-user{background:#E0F2FE;color:#0369A1}
    .picker-label{font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:#888;margin-bottom:8px;display:block;margin-top:4px}
    .search-wrap{position:relative;margin-bottom:8px}
    .search-wrap input{width:100%;padding:9px 14px 9px 36px;border:1.5px solid #e8e8e8;border-radius:8px;font-size:13px;font-family:'Montserrat',sans-serif;color:#231F20;outline:none;transition:border-color .15s;-webkit-appearance:none}
    .search-wrap input:focus{border-color:#EE3124}
    .search-icon{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:#bbb;font-size:15px;pointer-events:none;line-height:1}
    .project-list{display:flex;flex-direction:column;gap:6px;max-height:280px;overflow-y:auto;margin-bottom:14px;padding-right:2px;-webkit-overflow-scrolling:touch}
    .project-list::-webkit-scrollbar{width:4px}
    .project-list::-webkit-scrollbar-track{background:#f5f5f5;border-radius:4px}
    .project-list::-webkit-scrollbar-thumb{background:#ddd;border-radius:4px}
    .project-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border:1.5px solid #e8e8e8;border-radius:8px;cursor:pointer;transition:border-color .15s,background .15s;user-select:none}
    .project-item:hover{border-color:#EE3124;background:#fff8f8}
    .project-item.selected{border-color:#EE3124;background:#fff8f8}
    .project-item input[type=radio]{accent-color:#EE3124;width:15px;height:15px;flex-shrink:0;cursor:pointer}
    .project-item-body{flex:1;min-width:0}
    .project-item-id{font-size:10px;font-weight:700;letter-spacing:.04em;background:#EE3124;color:#fff;padding:1px 7px;border-radius:4px;display:inline-block;margin-bottom:3px}
    .project-item-id.consolidated{background:#231F20}
    .project-item-name{font-size:13px;font-weight:600;color:#231F20;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .project-item-sub{font-size:11px;color:#999}
    .no-results{text-align:center;color:#bbb;font-size:13px;padding:16px 0}
    .picker-footer{text-align:center;margin-top:12px;font-size:13px;color:#999}
    .picker-footer a{color:#EE3124;text-decoration:none;font-weight:600}
    .msg2{font-size:13px;padding:10px 14px;border-radius:8px;margin-bottom:12px;display:none;border:1px solid #FFD0D0;background:#FEE2E2;color:#991B1B}
    .msg2.show{display:block}

    /* ── Mobile layout ── */
    @media(max-width:640px){
      .page{flex-direction:column}
      /* Compact brand: horizontal row with logo + title */
      .brand{
        flex:0 0 auto;padding:14px 18px;min-height:auto;
        flex-direction:row;align-items:center;gap:14px
      }
      .brand::before{display:none}
      .brand-logo{height:44px;flex-shrink:0}
      .brand-text h1{font-size:14px;margin-top:0;line-height:1.3}
      .brand-text p{font-size:10px;margin-top:2px}
      .form-wrap{
        padding:24px 20px 36px;
        flex:1;min-height:auto;
        justify-content:flex-start
      }
      .form-inner{max-width:100%}
      .form-title{font-size:19px}
      .project-list{max-height:220px}
      /* Tap target sizes */
      .field input{padding:13px 14px;font-size:16px}
      .btn-primary{padding:14px;font-size:15px;min-height:50px}
      .project-item{padding:12px}
      /* Stack Register / Forgot password on separate lines — no clutter */
      .form-links{flex-direction:column;align-items:flex-start;gap:12px;margin-top:18px}
    }
  </style>
</head>
<body>
<div class="page">

  <!-- ── Brand Panel ── -->
  <div class="brand">
    <img class="brand-logo" src="assets/img/megawide-logo.png" alt="Megawide Construction">
    <div class="brand-text">
      <h1>EPC Procurement<br><span>Work Package</span><br>Dashboard</h1>
      <p>Megawide Construction Corporation</p>
    </div>
  </div>

  <!-- ── Form Panel ── -->
  <div class="form-wrap">
    <div class="form-inner">

      <!-- STEP 1: Login -->
      <div class="login-form" id="loginForm">
        <div class="form-title">Welcome back</div>
        <div class="form-sub">Sign in to your account</div>
        <div class="msg" id="msgBox"></div>
        <div class="field">
          <label>Email</label>
          <input type="email" id="email" placeholder="yourname@megawide.com.ph" autocomplete="email" inputmode="email">
        </div>
        <div class="field">
          <label>Password</label>
          <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
        </div>
        <button class="btn-primary" id="btnSignIn">Sign In</button>
        <div class="form-links">
          <span>Don't have an account? <a href="register.html">Register</a></span>
          <a href="forgot-password.html">Forgot password?</a>
        </div>
      </div>

      <!-- STEP 2: Project picker -->
      <div class="project-picker" id="projectPicker">
        <div class="form-title">Select Dashboard</div>
        <div class="form-sub" id="pickerGreeting">Choose which dashboard to open.</div>
        <div class="msg2" id="msgBox2"></div>

        <span class="picker-label">Choose a view</span>

        <!-- Search — shown when > 5 items -->
        <div class="search-wrap" id="searchWrap" style="display:none">
          <span class="search-icon">🔍</span>
          <input type="text" id="searchInput" placeholder="Search projects…" autocomplete="off">
        </div>

        <div class="project-list" id="projectList"></div>

        <button class="btn-primary" id="btnGo">Open Dashboard →</button>
        <div class="picker-footer"><a href="#" id="signOutLink">Sign out</a></div>
      </div>

    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
const sb = window.supabase.createClient(
  'https://cayjeqeleenizbdzrums.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNheWplcWVsZWVuaXpiZHpydW1zIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk3OTE5NzUsImV4cCI6MjA5NTM2Nzk3NX0.xWF6mSMTYSL65S56FTUSWFN0udJSY_yzUedU2CwFwpw'
);

function showMsg(id, text) {
  const el = document.getElementById(id);
  el.textContent = text;
  el.classList.add('show');
}
function clearMsg(id) {
  const el = document.getElementById(id);
  el.textContent = '';
  el.classList.remove('show');
}

// Auto-restore session
(async () => {
  const { data: { session } } = await sb.auth.getSession();
  if (session) {
    const { data: p } = await sb.from('users').select('*').eq('id', session.user.id).single();
    if (p?.status === 'approved') showProjectPicker(p);
    else if (p?.status === 'pending') window.location.href = 'pending.html';
  }
})();

// Sign In handler
document.getElementById('btnSignIn').addEventListener('click', handleSignIn);
document.getElementById('password').addEventListener('keydown', e => { if (e.key === 'Enter') handleSignIn(); });
document.getElementById('email').addEventListener('keydown', e => { if (e.key === 'Enter') document.getElementById('password').focus(); });

async function handleSignIn() {
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const btn = document.getElementById('btnSignIn');
  clearMsg('msgBox');
  if (!email || !password) { showMsg('msgBox', 'Please enter your email and password.'); return; }
  btn.textContent = 'Signing in…'; btn.disabled = true;

  const { data, error } = await sb.auth.signInWithPassword({ email, password });
  if (error) {
    showMsg('msgBox', error.message === 'Invalid login credentials' ? 'Incorrect email or password.' : error.message);
    btn.textContent = 'Sign In'; btn.disabled = false; return;
  }

  const { data: profile } = await sb.from('users').select('*').eq('id', data.user.id).single();
  if (!profile) { showMsg('msgBox', 'Account not found. Please register first.'); await sb.auth.signOut(); btn.textContent = 'Sign In'; btn.disabled = false; return; }
  if (profile.status === 'pending') { window.location.href = 'pending.html'; return; }
  if (profile.status === 'rejected') { showMsg('msgBox', 'Your registration was not approved. Please contact your administrator.'); await sb.auth.signOut(); btn.textContent = 'Sign In'; btn.disabled = false; return; }
  // Record last login time (non-blocking)
  sb.from('users').update({ last_login: new Date().toISOString() }).eq('id', data.user.id).then(() => {});
  showProjectPicker(profile);
}

// Project picker state
let allItems = [];
let selectedValue = null;

async function showProjectPicker(profile) {
  document.getElementById('loginForm').classList.add('hidden');
  document.getElementById('projectPicker').classList.add('visible');

  const name = profile.name || profile.email.split('@')[0];
  const roleLabel = profile.role === 'super_admin' ? 'Super Admin' : profile.role === 'admin' ? 'Admin' : 'User';
  const roleClass = profile.role === 'super_admin' ? 'role-super' : profile.role === 'admin' ? 'role-admin' : 'role-user';
  document.getElementById('pickerGreeting').innerHTML =
    `Hi <strong>${name}</strong>! <span class="role-badge ${roleClass}">${roleLabel}</span><br>Choose which dashboard to open.`;

  const isAdmin = ['admin', 'super_admin'].includes(profile.role);
  const { data: projects } = await sb.from('projects').select('id,name,location').order('id');
  const visible = isAdmin ? (projects || []) : (projects || []).filter(p => (profile.projects || []).includes(p.id));

  allItems = [];
  // Portfolio overview: admins always; users get it when assigned to 2+ projects
  const showPortfolio = isAdmin || visible.length >= 2;
  if (showPortfolio) {
    const sub = isAdmin ? 'All projects & work packages' : `Your ${visible.length} assigned projects`;
    allItems.push({ value: 'consolidated', id: 'ALL PROJECTS', name: 'Portfolio — Consolidated View', sub, consolidated: true });
  }
  visible.forEach(p => allItems.push({ value: p.id, id: p.id, name: p.name || p.id, sub: p.location || '', consolidated: false }));

  // User with exactly 1 project: skip picker, go directly
  if (!isAdmin && visible.length === 1) {
    window.location.href = `project.html?id=${visible[0].id}`;
    return;
  }
  if (allItems.length > 5) document.getElementById('searchWrap').style.display = 'block';
  renderList(allItems);
  if (allItems.length) selectItem(allItems[0].value);
}

function renderList(items) {
  const list = document.getElementById('projectList');
  if (!items.length) { list.innerHTML = '<div class="no-results">No projects found</div>'; return; }
  list.innerHTML = items.map(item => `
    <div class="project-item ${selectedValue === item.value ? 'selected' : ''}" data-value="${item.value}" onclick="selectItem('${item.value}')">
      <input type="radio" name="dest" value="${item.value}" ${selectedValue === item.value ? 'checked' : ''}>
      <div class="project-item-body">
        <div class="project-item-id ${item.consolidated ? 'consolidated' : ''}">${item.id}</div>
        <div class="project-item-name">${item.name}</div>
        ${item.sub ? `<div class="project-item-sub">${item.sub}</div>` : ''}
      </div>
    </div>`).join('');
}

window.selectItem = function(value) {
  selectedValue = value;
  document.querySelectorAll('.project-item').forEach(el => {
    el.classList.toggle('selected', el.dataset.value === value);
    el.querySelector('input[type=radio]').checked = el.dataset.value === value;
  });
};

// Live search filter
document.getElementById('searchInput').addEventListener('input', function() {
  const q = this.value.toLowerCase();
  const filtered = allItems.filter(i =>
    i.name.toLowerCase().includes(q) ||
    i.id.toLowerCase().includes(q) ||
    (i.sub || '').toLowerCase().includes(q)
  );
  renderList(filtered);
  if (filtered.find(i => i.value === selectedValue)) selectItem(selectedValue);
  else if (filtered.length) selectItem(filtered[0].value);
});

document.getElementById('btnGo').addEventListener('click', () => {
  if (!selectedValue) { showMsg('msgBox2', 'Please select a dashboard.'); return; }
  if (selectedValue === 'consolidated') window.location.href = 'index.html';
  else window.location.href = `project.html?id=${selectedValue}`;
});

document.getElementById('signOutLink').addEventListener('click', async e => {
  e.preventDefault();
  await sb.auth.signOut();
  window.location.reload();
});
</script>
</body>
</html>
