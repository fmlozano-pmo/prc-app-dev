const log = document.getElementById('log');
function p(msg, cls='') { log.innerHTML += `<span class="${cls}">${msg}</span>
`; log.scrollTop=log.scrollHeight; }

window.runImport = async function() {
  const btn = document.getElementById('btn');
  btn.disabled = true;
  log.innerHTML = '';

  // Check auth
  const { data: { session } } = await sb.auth.getSession();
  if (!session) { p('❌ Not logged in. Please log in first at login.html', 'err'); btn.disabled=false; return; }
  const { data: profile } = await sb.from('users').select('role').eq('id', session.user.id).single();
  if (!['admin','super_admin'].includes(profile?.role)) { p('❌ Admin access required.', 'err'); btn.disabled=false; return; }
  p('✓ Authenticated as ' + session.user.email, 'ok');

  // Step 1: Delete existing AVR101 WPs
  p('
⏳ Deleting existing AVR101 work packages...', 'info');
  const { error: delErr, count } = await sb.from('work_packages').delete().eq('project_id','AVR101');
  if (delErr) { p('❌ Delete error: ' + delErr.message, 'err'); btn.disabled=false; return; }
  p('✓ Deleted existing WPs', 'ok');

  // Step 2: Insert in batches of 20
  p('
⏳ Inserting ' + WPS.length + ' work packages...', 'info');
  const BATCH = 20;
  let inserted = 0, errors = 0;
  for (let i = 0; i < WPS.length; i += BATCH) {
    const batch = WPS.slice(i, i + BATCH);
    const { error } = await sb.from('work_packages').insert(batch);
    if (error) {
      p(`  ❌ Batch ${Math.floor(i/BATCH)+1} error: ${error.message}`, 'err');
      errors++;
    } else {
      inserted += batch.length;
      p(`  ✓ Inserted WPs ${i+1}–${Math.min(i+BATCH, WPS.length)} (${inserted}/${WPS.length})`, 'ok');
    }
  }

  p(`
${errors===0 ? '✅' : '⚠️'} Import complete — ${inserted} inserted, ${errors} batch errors`, errors===0?'ok':'err');
  p('Refresh the AVR101 dashboard to see the updated data.', 'info');
  btn.disabled = false;
};
