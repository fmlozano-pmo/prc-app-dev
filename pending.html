  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html,body{height:100%;font-family:'Montserrat',sans-serif;background:#F4F4F4;display:flex;align-items:center;justify-content:center;padding:24px}
    .card{background:#fff;border-radius:16px;box-shadow:0 4px 32px rgba(0,0,0,.08);padding:48px 40px;max-width:480px;width:100%;text-align:center}
    .logo-wrap{margin-bottom:32px;display:flex;justify-content:center}
    .logo-wrap img{height:40px;width:auto;object-fit:contain}
    .icon-wrap{width:72px;height:72px;border-radius:50%;background:#FEF3C7;display:flex;align-items:center;justify-content:center;margin:0 auto 20px;font-size:32px}
    h1{font-size:20px;font-weight:700;color:#231F20;margin-bottom:10px}
    .desc{font-size:14px;color:#888;line-height:1.7;margin-bottom:32px}
    .desc strong{color:#231F20}
    .btn-outline{display:inline-flex;align-items:center;gap:8px;padding:11px 24px;border:1.5px solid #EE3124;border-radius:8px;color:#EE3124;font-size:14px;font-weight:600;font-family:'Montserrat',sans-serif;text-decoration:none;cursor:pointer;background:none;transition:all .15s;margin-bottom:10px;width:100%;justify-content:center}
    .btn-outline:hover{background:#EE3124;color:#fff}
    .btn-ghost{display:inline-flex;align-items:center;gap:8px;padding:11px 24px;border:1.5px solid #e8e8e8;border-radius:8px;color:#888;font-size:14px;font-family:'Montserrat',sans-serif;text-decoration:none;cursor:pointer;background:none;transition:all .15s;width:100%;justify-content:center}
    .btn-ghost:hover{border-color:#bbb;color:#555}
    .divider{border:none;border-top:1px solid #f0f0f0;margin:8px 0}
  </style>
