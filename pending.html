<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Pending Approval — Megawide Procurement</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css"/>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&display=swap');
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Montserrat','Segoe UI',system-ui,sans-serif;background:#231F20;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
    .card{background:#fff;border-radius:16px;padding:48px 40px;max-width:420px;width:100%;text-align:center;box-shadow:0 8px 32px rgba(0,0,0,0.2)}
    .logo{width:140px;height:auto;margin:0 auto 28px;display:block;filter:invert(1) sepia(1) saturate(5) hue-rotate(330deg)}
    .icon-wrap{width:64px;height:64px;border-radius:50%;background:#FEF3C7;display:flex;align-items:center;justify-content:center;margin:0 auto 20px}
    .icon-wrap i{font-size:32px;color:#D97706}
    h2{font-size:20px;font-weight:800;margin-bottom:8px;color:#231F20}
    p{font-size:12px;color:#5A5858;line-height:1.7;margin-bottom:24px;font-weight:500}
    .btn-back{display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:700;color:#EE3124;text-decoration:none;padding:8px 16px;border-radius:8px;border:1.5px solid #EE3124;transition:all .15s}
    .btn-back:hover{background:#EE3124;color:#fff}
    .btn-out{display:inline-flex;align-items:center;gap:6px;margin-top:12px;font-size:12px;font-weight:600;padding:8px 16px;border-radius:8px;border:1.5px solid rgba(0,0,0,0.12);background:#fff;color:#5A5858;cursor:pointer;text-decoration:none;transition:all .15s}
    .btn-out:hover{border-color:#EE3124;color:#EE3124}
  </style>
</head>
<body>
<div class="card">
  <img src="assets/img/logo-white.png" class="logo" alt="Megawide Construction"/>
  <div class="icon-wrap"><i class="ti ti-clock"></i></div>
  <h2>Awaiting Approval</h2>
  <p>Your registration has been submitted successfully.<br><br>
  The administrator will review your request and assign your project access. Please check back later or contact your procurement manager.</p>
  <a href="login.html" class="btn-back"><i class="ti ti-arrow-left" style="font-size:13px"></i> Back to Sign In</a><br>
  <a class="btn-out" href="#" onclick="firebase.auth().signOut().then(()=>location.href='login.html')">
    <i class="ti ti-logout" style="font-size:13px"></i> Sign out
  </a>
</div>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="assets/js/firebase-config.js"></script>
</body>
</html>
