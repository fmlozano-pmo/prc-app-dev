<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Pending Approval — EPC WPM Dashboard</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css"/>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Inter','Segoe UI',system-ui,sans-serif;
      background:linear-gradient(135deg,#042C53,#0C447C,#185FA5);
      min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
    .card{background:#fff;border-radius:16px;padding:40px 32px;max-width:400px;width:100%;
      text-align:center;box-shadow:0 4px 24px rgba(0,0,0,0.1)}
    .icon{font-size:48px;color:#EF9F27;margin-bottom:16px;display:block}
    h2{font-size:18px;font-weight:600;margin-bottom:8px;color:#1A1A1A}
    p{font-size:12px;color:#5A5A6A;line-height:1.7;margin-bottom:20px}
    a{font-size:12px;color:#185FA5;font-weight:500;text-decoration:none}
    a:hover{text-decoration:underline}
    .btn-out{display:inline-flex;align-items:center;gap:6px;margin-top:16px;font-size:12px;
      padding:7px 16px;border-radius:8px;border:1px solid rgba(0,0,0,0.12);
      background:#fff;color:#5A5A6A;cursor:pointer;text-decoration:none}
  </style>
</head>
<body>
<div class="card">
  <i class="ti ti-clock icon"></i>
  <h2>Awaiting Admin Approval</h2>
  <p>Your registration has been submitted.<br><br>
  The administrator will review your request and assign your project access. Please check back later or contact your project admin.</p>
  <a href="login.html"><i class="ti ti-arrow-left" style="font-size:12px;vertical-align:middle"></i> Back to Sign In</a><br>
  <a class="btn-out" href="#" onclick="firebase.auth().signOut().then(()=>location.href='login.html')">
    <i class="ti ti-logout" style="font-size:13px"></i> Sign out
  </a>
</div>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="assets/js/firebase-config.js"></script>
</body>
</html>
