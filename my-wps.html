<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My Work Packages — EPC WPM</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css"/>
  <link rel="stylesheet" href="assets/css/dashboard.css"/>
  <script src="assets/js/auth.js"></script>
  <script src="assets/js/ui.js"></script>
  <script src="assets/js/db.js"></script>
  <style>
    .wp-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);
      padding:16px;margin-bottom:10px;box-shadow:var(--shadow);display:flex;align-items:flex-start;gap:14px;flex-wrap:wrap}
    .wp-card-body{flex:1;min-width:200px}
    .wp-card-title{font-size:13px;font-weight:600;color:var(--text-primary);margin-bottom:3px}
    .wp-card-sub{font-size:11px;color:var(--text-secondary);margin-bottom:8px}
    .wp-card-meta{display:flex;gap:10px;flex-wrap:wrap;font-size:11px;color:var(--text-secondary)}
    .wp-card-actions{display:flex;gap:8px;align-items:center;flex-shrink:0}
    .rs-badge{font-size:10px;font-weight:600;padding:3px 10px;border-radius:20px;display:inline-block}
    .rs-approved{background:#EAF3DE;color:#3B6D11}
    .rs-pending{background:#FAEEDA;color:#854F0B}
    .rs-rejected{background:#FCEBEB;color:#A32D2D}
    .rejection-note{background:#FFF0F0;border:1px solid #FFD0D0;border-radius:8px;
      padding:8px 12px;font-size:11px;color:#A32D2D;margin-top:8px}
    .empty{text-align:center;padding:60px 20px;color:var(--text-hint)}
    .empty i{font-size:48px;display:block;margin-bottom:12px;opacity:.3}
    .filter-tabs{display:flex;gap:4px;margin-bottom:16px;flex-wrap:wrap}
    .ftab{padding:6px 14px;border-radius:8px;border:1px solid #e5e5e5;font-size:12px;font-weight:500;
      cursor:pointer;background:#fff;color:#888;font-family:inherit;transition:all .15s}
    .ftab.active{background:#231F20;color:#fff;border-color:#231F20}
    .nbadge{background:#EE3124;color:#fff;border-radius:10px;padding:1px 6px;font-size:10px;margin-left:4px;font-weight:700}
  </style>
</head>

    <div class="sidebar-section">
      <div class="sidebar-section-label">Navigation</div>
      <a class="nav-item" id="nav-proj-link" href="#"><i class="ti ti-layout-dashboard"></i>Dashboard</a>
    </div>
    <div class="sidebar-section">
      <div class="sidebar-section-label">My Work</div>
      <a class="nav-item active" href="my-wps.html"><i class="ti ti-clipboard-list"></i>My Work Packages</a>
      <a class="nav-item" id="add-wp-nav" href="wp-form.html"><i class="ti ti-circle-plus"></i>Add Work Package</a>
    </div>
    <div class="sidebar-footer">Megawide Construction Corporation<br>EPC · Procurement · WPM System</div>
  </aside>

  <div class="main">
    <div class="topbar">
      <div class="topbar-left">
        <button class="btn-menu" id="btn-menu" aria-label="Open menu"><i class="ti ti-menu-2"></i></button>
        <div class="page-title">My Work Packages</div>
      </div>
      <div class="topbar-right"><div id="user-bar"></div></div>
    </div>
    <div class="content">
      <div id="loading" class="loading-overlay"><div class="spinner"></div><span>Loading your work packages…</span></div>
      <div id="main-content" style="display:none">
        <div class="filter-tabs">
          <button class="ftab active" onclick="filterWPs('all')">All <span class="nbadge" id="ct-all">0</span></button>
          <button class="ftab" onclick="filterWPs('approved')">Approved <span class="nbadge" id="ct-approved" style="background:#2D9B6F">0</span></button>
          <button class="ftab" onclick="filterWPs('pending_review')">Pending <span class="nbadge" id="ct-pending" style="background:#D97706">0</span></button>
          <button class="ftab" onclick="filterWPs('rejected')">Rejected <span class="nbadge" id="ct-rejected" style="background:#888">0</span></button>
        </div>
        <div id="wp-list"></div>
      </div>
    </div>
  </div>
</div>

<script>
  let allWPs = [], currentFilter = 'all';
  initMobileMenu();

  AppAuth.requireLogin(async (user, profile) => {
    const urlProjId = new URLSearchParams(location.search).get('project');

    if (profile.role === 'user') {
      // Users must have a project context — use URL param, then first assigned project
      const projId = urlProjId || (profile.projects||[])[0];
      if (!projId) { location.href = 'login.html'; return; }
      // Never show consolidated link to users
      document.getElementById('nav-proj-link').href = 'project.html?id=' + projId;
      document.getElementById('add-wp-nav').href = 'wp-form.html?project=' + projId;
      renderUserBar('user-bar', profile);
      // Load WPs for this specific project only (project isolation)
      allWPs = await WPDb.getAllWPs(projId);
    } else {
      // Admin/super_admin
      if (urlProjId) {
        document.getElementById('nav-proj-link').href = 'project.html?id=' + urlProjId;
        document.getElementById('add-wp-nav').href = 'wp-form.html?project=' + urlProjId;
      } else {
        document.getElementById('nav-proj-link').href = 'index.html?view=consolidated';
        document.getElementById('add-wp-nav').href = 'wp-form.html';
      }
      renderUserBar('user-bar', profile);
      allWPs = urlProjId ? await WPDb.getAllWPs(urlProjId) : await WPDb.getAllWPsForAdmin();
    }

    // Update counts
    document.getElementById('ct-all').textContent = allWPs.length;
    document.getElementById('ct-approved').textContent = allWPs.filter(w=>w.review_status==='approved').length;
    document.getElementById('ct-pending').textContent = allWPs.filter(w=>w.review_status==='pending_review').length;
    document.getElementById('ct-rejected').textContent = allWPs.filter(w=>w.review_status==='rejected').length;

    renderList(allWPs);
    document.getElementById('loading').style.display = 'none';
    document.getElementById('main-content').style.display = 'block';
  });

  function filterWPs(status) {
    currentFilter = status;
    document.querySelectorAll('.ftab').forEach((t,i)=>t.classList.toggle('active',['all','approved','pending_review','rejected'][i]===status));
    const filtered = status === 'all' ? allWPs : allWPs.filter(w=>w.review_status===status);
    renderList(filtered);
  }

  function fmtDate(d) {
    if (!d) return '—';
    try { return new Date(d).toLocaleDateString('en-PH',{month:'short',day:'numeric',year:'2-digit'}); }
    catch { return d; }
  }

  function renderList(wps) {
    const el = document.getElementById('wp-list');
    if (!wps.length) {
      el.innerHTML = '<div class="empty"><i class="ti ti-clipboard-x"></i><div>No work packages found</div></div>';
      return;
    }
    el.innerHTML = wps.map(w => {
      const rsClass = {approved:'rs-approved',pending_review:'rs-pending',rejected:'rs-rejected'}[w.review_status]||'rs-pending';
      const rsLabel = {approved:'Approved',pending_review:'Pending Review',rejected:'Rejected'}[w.review_status]||w.review_status;
      const budget = w.approved_budget_bcb ? '₱'+(w.approved_budget_bcb/1e6).toFixed(2)+'M' : '—';
      const awarded = w.total_awarded ? '₱'+(w.total_awarded/1e6).toFixed(2)+'M' : '—';
      return `<div class="wp-card">
        <div class="wp-card-body">
          <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px">
            <span class="td-code" style="font-size:11px;background:#f0f0f0;padding:2px 8px;border-radius:4px;font-weight:600">${w.wp_no}</span>
            <span class="rs-badge ${rsClass}">${rsLabel}</span>
            <span style="font-size:10px;color:#888;background:#f5f5f5;padding:1px 6px;border-radius:4px">${w.award_status}</span>
          </div>
          <div class="wp-card-title">${w.description||'—'}</div>
          <div class="wp-card-sub">${w.project_id} · ${w.trade||'—'} · ${w.zone||'—'}</div>
          <div class="wp-card-meta">
            <span>Budget: ${budget}</span>
            <span>Awarded: ${awarded}</span>
            <span>Planned Award: ${fmtDate(w.awarding_date)}</span>
          </div>
          ${w.review_notes&&w.review_status==='rejected'?`<div class="rejection-note">Rejected: ${w.review_notes}</div>`:''}
        </div>
        <div class="wp-card-actions">
          <a href="wp-form.html?id=${w.id}&project=${w.project_id}" class="btn" style="font-size:12px;padding:6px 14px">
            <i class="ti ti-edit" style="font-size:13px"></i> Edit
          </a>
        </div>
      </div>`;
    }).join('');
  }
</script>
</body>
